<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ profile.name }} — Universe</title>
    <style>
        body { margin:0; font-family:-apple-system,sans-serif; font-size:13px; background:#fff; }
        .header { background:#1a1a2e; color:#fff; padding:8px 12px; font-size:14px; font-weight:bold; }
        .header small { color:#999; font-weight:normal; margin-left:6px; }
        .subtitle { padding:4px 12px; font-size:11px; color:#888; border-bottom:1px solid #eee; }
        table { width:100%; border-collapse:collapse; }
        th { position:sticky; top:0; background:#f5f5f5; padding:4px 12px; text-align:left;
             font-size:10px; text-transform:uppercase; color:#999; border-bottom:1px solid #ddd; }
        td { padding:3px 12px; border-bottom:1px solid #f0f0f0; }
        tr:hover { background:#f8f8ff; }
        .custom td:first-child { color:#00c853; font-weight:bold; }
    </style>
</head>
<body>
    <div class="header">{{ profile.name }}<small>{{ profile.market_type_name }}</small></div>
    <div class="subtitle">{{ base_count }} symbols{% if custom_count %} + {{ custom_count }} custom{% endif %}</div>
    <table>
        <thead><tr><th>Symbol</th><th>Name</th></tr></thead>
        <tbody>
        {% for s in symbols %}
            <tr{% if s.custom %} class="custom"{% endif %}>
                <td>{{ s.symbol }}</td>
                <td style="color:#888;">{{ s.name }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
