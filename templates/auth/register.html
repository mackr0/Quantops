{% extends "base.html" %}
{% block title %}Register - QuantOpsAI{% endblock %}
{% block content %}
<article class="auth-card">
    <header>
        <h2>Create Account</h2>
        <p class="muted">Set up your QuantOpsAI trading dashboard</p>
    </header>
    <form method="post" action="/register">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" placeholder="Your name (optional)">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required minlength="8">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required minlength="8">

        <button type="submit">Create Account</button>
    </form>
    <footer>
        <p>Already have an account? <a href="/login">Sign in</a></p>
    </footer>
</article>
{% endblock %}
